spring:
  data:
    mongodb:
      uri: mongodb://admin:admin@localhost:27019/booklibre_test?authSource=admin
  datasource:
    url: jdbc:h2:mem:booklibre_test;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  key: test-secret-key-test-secret-key-test-secret-key
  access-token-expiration: 900000
  refresh-token-expiration: 1800000

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.tool.schema: DEBUG