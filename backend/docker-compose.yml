services:
  db:
    image: postgres:18-alpine
    container_name: booklibre_sql
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - '5433:5432'
    volumes:
      - db:/var/lib/postgresql/data
      - ./Docker/init_db.sh:/docker-entrypoint-initdb.d/01_init_db.sh

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4_container_booklibre
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@phm.edu.ar
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  mongo:
    # tomamos la última imagen de mongo
    image: mongo:latest
    container_name: mongo_libros
    hostname: host-mongo

    # mapeo el puerto de mi computadora 27019 contra el 27017 (importante porque es el default de mongo)
    ports:
      - "27019:27017"
    volumes:
      - ~/apps/mongo_libros_db:/data/db
      - ~/apps/mongo_libros_log:/var/log/mongodb/
      - ./Docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: book_libre

  redis-booklibre:
    container_name: redis-booklibre
    hostname: redis
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

  redisinsight:
    container_name: redis-insight-booklibre
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
    depends_on:
      - redis-booklibre

volumes:
  db:
  pgadmin-data:
  redisinsight-data: